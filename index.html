<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сервис проверки</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #2c3e50;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #3498db;
        }

        button {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background: #2980b9;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .success {
            background: #e8f8f5;
            color: #2ecc71;
            border: 1px solid #d1f2eb;
        }

        .error {
            background: #fce4d6;
            color: #e74c3c;
            border: 1px solid #fadbd8;
        }

        .loading {
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Проверка ресурса</h1>
    
    <div class="input-group">
        <input type="text" id="checkInput" placeholder="Введите текст или URL...">
        <button onclick="runCheck()">Проверить</button>
    </div>

    <div id="resultBlock" class="result"></div>
</div>

<script>
    function runCheck() {
        const input = document.getElementById('checkInput').value.trim();
        const resultBlock = document.getElementById('resultBlock');

        if (!input) {
            showResult('Пожалуйста, введите что-нибудь для проверки.', 'error');
            return;
        }

        showResult('Проверяем...', 'loading');

        setTimeout(() => {
            if (input.includes('ошибка') || input.length < 3) {
                showResult('⚠️ Проверка не пройдена. Обнаружена ошибка или текст слишком короткий.', 'error');
            } else {
                showResult('✅ Проверка успешно пройдена! Всё отлично.', 'success');
            }
        }, 1000);
    }

    function showResult(text, type) {
        const resultBlock = document.getElementById('resultBlock');
        resultBlock.className = 'result ' + type;
        resultBlock.innerText = text;
        resultBlock.style.display = 'block';
    }
</script>

</body>
</html>
